interface:
  display_name: "产品需求工具"
  short_description: "短调用入口：PRD、BDD、流程图与Figma原型"
  default_prompt: "使用 $prd 将这个原始产品想法转化为澄清后的需求、PRD、BDD 和 Figma 原型。所有面向用户的回复必须使用中文。"
dependencies:
  tools:
    - type: "mcp"
      value: "figma-console-mcp"
      description: "通过完整产品需求原型技能调用本地 Figma 桥接插件。"
policy:
  allow_implicit_invocation: true
